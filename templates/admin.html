<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">

<h1 class="text-3xl font-bold mb-8">👑 Admin Dashboard</h1>

<table class="w-full border border-gray-600">
    <thead class="bg-gray-800">
        <tr>
            <th class="p-3">Name</th>
            <th class="p-3">Email</th>
            <th class="p-3">Limit</th>
            <th class="p-3">Used</th>
            <th class="p-3">Remaining</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr class="border-t border-gray-700 text-center">
            <td class="p-3">{{ user[0] }}</td>
            <td class="p-3">{{ user[1] }}</td>
            <td class="p-3">{{ user[2] }}</td>
            <td class="p-3">{{ user[3] }}</td>
            <td class="p-3">{{ user[2] - user[3] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div class="mt-8">
    <a href="/index" class="bg-purple-600 px-4 py-2 rounded">⬅ Back</a>
</div>

</body>
</html>
