<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI-Language Translator</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

.glass {
  backdrop-filter: blur(10px);
  background-color: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.15);
}

.neon-text {
  text-shadow: 0 0 5px #00f7ff, 0 0 10px #00f7ff, 0 0 20px #00f7ff;
}
</style>
</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center px-4 py-10">
<div class="w-full max-w-3xl glass rounded-2xl p-8 space-y-6 shadow-2xl">

<div class="w-full px-4 py-2 text-sm text-right text-white bg-black bg-opacity-30">
👤 Logged in as: <strong>{{ full_name }}</strong> ({{ email }})
<a href="/logout" class="ml-4 text-red-300 underline hover:text-red-100">Logout</a>
</div>

<header class="text-center">
<h1 class="text-4xl font-bold neon-text">🤖 AI-Language Translator</h1>
<p class="text-md text-cyan-200 mt-2">Speak, Translate & Hear AI in Action</p>
</header>

<section class="space-y-4">
<label class="block text-lg font-semibold">Speech Language:</label>
<select id="speechLang" class="text-black px-2 py-1 rounded w-full"></select>

<textarea id="inputText" rows="3" class="w-full p-2 rounded text-black" placeholder="Type or speak here..."></textarea>

<button onclick="startRecognition()" class="px-4 py-2 bg-green-600 text-white rounded-xl">
🎤 Start Speech Recognition
</button>

<label class="flex items-center space-x-3">
<input type="checkbox" id="playAudio" checked />
<span>🎧 Play Audio</span>
</label>
</section>

<section class="space-y-4">
<label class="block text-lg font-semibold">Translate to:</label>
<select id="language" class="text-black px-2 py-1 rounded w-full"></select>

<button onclick="translateText()" class="px-4 py-2 bg-blue-600 text-white rounded-xl">
🌍 Translate
</button>
</section>

<section class="space-y-4">
<label class="block text-lg font-semibold">Translate to (Multiple):</label>
<select id="multiLangSelect" multiple class="w-full p-2 rounded bg-gray-800 text-white"></select>

<button onclick="translateSelected()" class="px-4 py-2 bg-green-600 text-white rounded-xl">
🌐 Translate Selected
</button>

<div id="multi-result" class="space-y-4 text-white"></div>
</section>

<div id="feedback" class="text-center text-yellow-300 text-sm min-h-[20px]"></div>

<audio id="audioPlayback" controls class="w-full mt-4 hidden"></audio>

</div>
</div>

<!-- LIMIT MODAL -->
<div id="limitModal" class="fixed top-0 left-0 w-full h-full bg-black bg-opacity-60 z-50 flex justify-center items-center" style="display:none;">
<div class="bg-white p-8 rounded-2xl max-w-lg w-11/12 text-center shadow-lg">
<h2 class="text-2xl font-bold text-black mb-4">🚫 Free Limit Reached</h2>
<p class="text-gray-700 mb-6">Choose a plan to unlock more translations</p>

<div class="flex flex-wrap justify-center gap-4">
<button onclick="buyPlan(5)" class="px-4 py-2 bg-blue-600 text-white rounded-full">5 Credits</button>
<button onclick="buyPlan(10)" class="px-4 py-2 bg-green-600 text-white rounded-full">10 Credits</button>
<button onclick="buyPlan(15)" class="px-4 py-2 bg-orange-500 text-white rounded-full">15 Credits</button>
</div>

<button onclick="closeModal()" class="mt-6 underline text-gray-600">Close</button>
</div>
</div>

<script>
const languages = {
'en':'English','hi':'Hindi','mr':'Marathi','kn':'Kannada',
'gu':'Gujarati','ml':'Malayalam','de':'German','fr':'French',
'es':'Spanish','ja':'Japanese'
};

const speechLangSelect=document.getElementById("speechLang");
const translateLangSelect=document.getElementById("language");
const multiLangSelect=document.getElementById("multiLangSelect");
const feedback=document.getElementById("feedback");
const audioPlayer=document.getElementById("audioPlayback");

for(const [code,name] of Object.entries(languages)){
speechLangSelect.add(new Option(`${name} [${code}]`,code));
translateLangSelect.add(new Option(`${name} [${code}]`,code));
multiLangSelect.add(new Option(`${name} [${code}]`,code));
}

new TomSelect('#speechLang');
new TomSelect('#language');
new TomSelect('#multiLangSelect');

async function translateSelected(){
const text=document.getElementById("inputText").value.trim();
const selected=Array.from(multiLangSelect.selectedOptions).map(o=>o.value);
const playAudio=document.getElementById("playAudio").checked;

if(!text||selected.length===0){
feedback.textContent="⚠️ Enter text & select languages";
return;
}

const res=await fetch('/translate-multi',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({text,languages:selected,playAudio})
});

const data=await res.json();

if(!res.ok){
if(data.limit_reached){
document.getElementById("limitModal").style.display="flex";
return;
}
feedback.textContent="❌ "+data.error;
return;
}

feedback.textContent="✅ Translation complete!";
}
 
function buyPlan(extraMessages){
fetch("/buy-plan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({messages:extraMessages})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("limitModal").style.display="none";

if(data.receipt_url){
const link=document.createElement("a");
link.href=data.receipt_url;
link.download="receipt.pdf";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}
});
}

function closeModal(){
document.getElementById("limitModal").style.display="none";
}

/* PARTICLE BACKGROUND */
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.style.position="fixed";
canvas.style.top=0;
canvas.style.left=0;
canvas.style.zIndex="-1";
canvas.style.pointerEvents="none";
document.body.prepend(canvas);

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

const particles=[];
for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*1.5,
dy:(Math.random()-0.5)*1.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="rgba(0,247,255,0.7)";
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
